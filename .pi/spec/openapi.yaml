components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
    abidoShakerHeader:
      type: apiKey
      in: header
      name: abidoshaker
      description: Existing admin/bot compatibility header. Current expected value is `secret`.

  parameters:
    RestaurantId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1
    MenuItemId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1
    CartItemId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1
    CartOrderId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1
    LocationId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1

  schemas:
    ResponseBase:
      type: object
      properties:
        status:
          type: string
          enum: [success, error]
        status_code:
          type: integer
        message:
          type: string
      required: [status, message]

    GenericSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ResponseBase'
        - type: object
          properties:
            status:
              type: string
              enum: [success]

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ResponseBase'
        - type: object
          properties:
            status:
              type: string
              enum: [error]

    AbidoShakerErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: I'm the liquid metal lemande sepre
      required: [error]

    TelegramAuthRequest:
      type: object
      properties:
        init_data:
          type: string
          description: Telegram Mini App init data string
      required: [init_data]

    User:
      type: object
      properties:
        id:
          type: integer
        telegram_id:
          type: integer
          format: int64
        username:
          type: string
          nullable: true
        first_name:
          type: string
        last_name:
          type: string
          nullable: true
        photo_url:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
      required: [id, telegram_id, first_name]

    AuthResult:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required: [access_token, user]

    AuthSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ResponseBase'
        - type: object
          properties:
            status:
              type: string
              enum: [success]
            result:
              $ref: '#/components/schemas/AuthResult'

    UserSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ResponseBase'
        - type: object
          properties:
            status:
              type: string
              enum: [success]
            result:
              $ref: '#/components/schemas/User'

    Restaurant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        image_url:
          type: string
          nullable: true
          example: https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=1200&q=80
        plate_price:
          type: integer
          format: int64
        delivery_fee:
          type: integer
          format: int64
        total_menu_items:
          type: integer
      required: [name]

    MenuItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        image_url:
          type: string
          nullable: true
          example: https://images.unsplash.com/photo-1604908176997-4317c43b0f4d?auto=format&fit=crop&w=1200&q=80
        price:
          type: integer
        max_portion:
          type: integer
        dish_type:
          type: string
          enum: [main, side, drink, chicken]
        status:
          type: string
          enum: [available, unavailable]
      required: [name]

    PublicRestaurant:
      type: object
      description: Customer-facing restaurant payload. Several display fields may be `null` when not backed by stored data.
      properties:
        id:
          type: integer
        name:
          type: string
        image_url:
          type: string
          nullable: true
        plate_price:
          type: integer
          format: int64
        delivery_fee:
          type: integer
          format: int64
        total_menu_items:
          type: integer
        description:
          type: string
          nullable: true
        cuisine:
          type: string
          nullable: true
        rating:
          type: number
          format: float
          nullable: true
        is_open:
          type: boolean
          nullable: true
        delivery_time_text:
          type: string
          nullable: true
        supports_fractional_quantity:
          type: boolean
          example: false
        quantity_step:
          type: number
          format: float
          example: 1
        promo_text:
          type: string
          nullable: true
      required: [id, name, plate_price, delivery_fee, total_menu_items, supports_fractional_quantity, quantity_step]

    PublicMenuItem:
      type: object
      description: Customer-facing menu item payload. Fractional quantity is currently unsupported.
      properties:
        id:
          type: integer
        restaurant_id:
          type: integer
        name:
          type: string
        image_url:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price:
          type: integer
        max_portion:
          type: integer
        dish_type:
          type: string
          enum: [main, side, drink, chicken]
        category_name:
          type: string
          example: Main Dishes
        status:
          type: string
          enum: [available, unavailable]
        supports_fractional_quantity:
          type: boolean
          example: false
        quantity_step:
          type: number
          format: float
          example: 1
      required: [id, restaurant_id, name, price, max_portion, dish_type, category_name, status, supports_fractional_quantity, quantity_step]

    PublicRestaurantDetail:
      type: object
      properties:
        restaurant:
          $ref: '#/components/schemas/PublicRestaurant'
        menu:
          type: array
          items:
            $ref: '#/components/schemas/PublicMenuItem'
      required: [restaurant, menu]

    SearchDishResult:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        image_url:
          type: string
          nullable: true
        price:
          type: integer
        dish_type:
          type: string
        restaurant:
          $ref: '#/components/schemas/PublicRestaurant'
        category_name:
          type: string
      required: [id, name, price, dish_type, restaurant, category_name]

    SearchResult:
      type: object
      properties:
        query:
          type: string
        restaurants:
          type: array
          items:
            $ref: '#/components/schemas/PublicRestaurant'
        dishes:
          type: array
          items:
            $ref: '#/components/schemas/SearchDishResult'
      required: [query, restaurants, dishes]

    Ambassador:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
          nullable: true
        sales_count:
          type: integer
          format: int64
          nullable: true
      required: [code]

    Order:
      type: object
      properties:
        id:
          type: integer
        restaurant_id:
          type: integer
        user_id:
          type: integer
          format: int64
        paid_status:
          type: string
        status:
          type: string
        user_info:
          type: string
          nullable: true
        referral_code:
          type: string
          nullable: true
        created_at:
          type: string
      required: [id, restaurant_id, user_id, paid_status, status, created_at]

    OrderHistoryOrderItem:
      type: object
      properties:
        order_item_id:
          type: integer
        menu_item_id:
          type: integer
        name:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        quantity:
          type: integer
        exists:
          type: boolean
        available:
          type: boolean
      required: [order_item_id, menu_item_id, quantity, exists, available]

    OrderHistoryGroup:
      type: object
      properties:
        id:
          type: integer
        restaurant_id:
          type: integer
        restaurant:
          allOf:
            - $ref: '#/components/schemas/Restaurant'
          nullable: true
        restaurant_exists:
          type: boolean
        all_items_available:
          type: boolean
        available_item_count:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderHistoryOrderItem'
      required: [id, restaurant_id, restaurant_exists, all_items_available, available_item_count, items]

    OrderHistoryItem:
      type: object
      description: One previous checked-out cart returned as order history entry.
      properties:
        id:
          type: integer
        created_at:
          type: string
          format: date-time
        can_reorder:
          type: boolean
        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderHistoryGroup'
      required: [id, created_at, can_reorder, orders]

    Location:
      type: object
      description: One predefined admin-managed location option that users may select for their cart.
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Lekki Phase 1
      required: [id, name]

    RestaurantLocationPrice:
      type: object
      description: Explicit delivery price override for one restaurant and one predefined location.
      properties:
        id:
          type: integer
          example: 7
        restaurant_id:
          type: integer
          example: 1
        location_id:
          type: integer
          example: 1
        price:
          type: integer
          format: int64
          example: 1500
        location:
          $ref: '#/components/schemas/Location'
      required: [id, restaurant_id, location_id, price, location]

    CartSummary:
      type: object
      description: |
        Pricing summary.

        Scope rules:
        - `handling_fee` and `surcharge` are summed from child orders
        - `extra_order_charge` is charged once per extra child order after first
        - `delivery_fee` is summed once per unique restaurant in cart
        - `transaction_fee` is applied once per cart
        - `service_charge` is applied once per cart
        - `discount` is applied once per cart
      properties:
        items_total:
          type: integer
          example: 5200
        delivery_fee:
          type: integer
          example: 2500
        handling_fee:
          type: integer
          example: 300
        surcharge:
          type: integer
          example: 550
        extra_order_charge:
          type: integer
          example: 300
        transaction_fee:
          type: integer
          example: 50
        service_charge:
          type: integer
          example: 500
        discount:
          type: integer
          example: 100
        sub_total:
          type: integer
          example: 9400
        total:
          type: integer
          example: 9300
      required: [items_total, delivery_fee, handling_fee, surcharge, extra_order_charge, transaction_fee, service_charge, discount, sub_total, total]

    CartItem:
      type: object
      properties:
        id:
          type: integer
        quantity:
          type: integer
        item:
          $ref: '#/components/schemas/MenuItem'
      required: [id, quantity, item]

    CartOrder:
      type: object
      properties:
        id:
          type: integer
        cart_id:
          type: integer
          nullable: true
        restaurant_id:
          type: integer
        restaurant:
          $ref: '#/components/schemas/Restaurant'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        paid_status:
          type: string
        status:
          type: string
        user_info:
          type: string
          nullable: true
        referral_code:
          type: string
          nullable: true
        summary:
          $ref: '#/components/schemas/CartSummary'
      required: [id, restaurant_id, restaurant, items, paid_status, status, summary]

    Cart:
      type: object
      description: |
        User-owned cart.

        `location_id` and `location` represent selected predefined location for whole cart.
        All child orders use this same cart location for delivery pricing.
      properties:
        id:
          type: integer
          example: 12
        user_id:
          type: integer
          example: 3
        location_id:
          type: integer
          nullable: true
          example: 1
        location:
          allOf:
            - $ref: '#/components/schemas/Location'
          nullable: true
        referral_code:
          type: string
          nullable: true
          example: AMB001
        user_info:
          type: string
          nullable: true
          example: No pepper please
        payment_locked:
          type: boolean
          example: false
        status:
          type: string
          enum: [active, checked_out]
        orders:
          type: array
          items:
            $ref: '#/components/schemas/CartOrder'
        summary:
          $ref: '#/components/schemas/CartSummary'
      required: [id, user_id, payment_locked, status, orders, summary]

    CreateCartOrderRequest:
      type: object
      properties:
        restaurant_id:
          type: integer
      required: [restaurant_id]

    AddCartItemRequest:
      type: object
      properties:
        order_id:
          type: integer
        menu_item_id:
          type: integer
        quantity:
          type: integer
          default: 1
      required: [order_id, menu_item_id]

    UpdateCartItemRequest:
      type: object
      description: Integer-only quantity update. Fractional or half-step quantity is not supported in current backend contract.
      properties:
        quantity:
          type: integer
          example: 2
      required: [quantity]

    UpdateCartInfoRequest:
      type: object
      properties:
        user_info:
          type: string
          nullable: true

    UpdateCartLocationRequest:
      type: object
      description: Set or clear selected predefined cart location.
      properties:
        location_id:
          type: integer
          nullable: true
          example: 1

    UpdateCartReferralRequest:
      type: object
      properties:
        referral_code:
          type: string
          nullable: true

    InitializePaymentRequest:
      type: object
      properties:
        cart_id:
          type: integer
          example: 12
        email:
          type: string
          format: email
          example: user@example.com
        callback_url:
          type: string
          example: https://app.example.com/payments/callback
      required: [cart_id, email, callback_url]

    VerifyPaymentRequest:
      type: object
      properties:
        reference:
          type: string
          example: pay_1_1746212345
      required: [reference]

    CancelPaymentRequest:
      type: object
      properties:
        reference:
          type: string
          example: pay_1_1746212345
      required: [reference]

    Payment:
      type: object
      properties:
        id:
          type: integer
        cart_id:
          type: integer
        user_id:
          type: integer
        provider:
          type: string
          example: paystack
        reference:
          type: string
        status:
          type: string
          enum: [initialized, pending, success, failed, cancelled, expired]
        amount:
          type: integer
          format: int64
        currency:
          type: string
          example: NGN
        email:
          type: string
          format: email
        authorization_url:
          type: string
          nullable: true
        access_code:
          type: string
          nullable: true
        callback_url:
          type: string
          nullable: true
        paid_at:
          type: string
          nullable: true
          format: date-time
      required: [id, cart_id, user_id, provider, reference, status, amount, currency, email]

    PaymentInitializeResult:
      type: object
      properties:
        provider:
          type: string
          example: paystack
        reference:
          type: string
        authorization_url:
          type: string
          nullable: true
        access_code:
          type: string
          nullable: true
        amount:
          type: integer
          format: int64
        currency:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [initialized, pending, success, failed, cancelled, expired]
      required: [provider, reference, amount, currency, email, status]

    CreateLocationRequest:
      type: object
      description: Create one predefined location option.
      properties:
        name:
          type: string
          example: Lekki Phase 1
      required: [name]

    UpdateLocationRequest:
      type: object
      description: Rename one predefined location option.
      properties:
        name:
          type: string
          example: Lekki Phase 1 Gate 2
      required: [name]

    UpsertRestaurantLocationPriceRequest:
      type: object
      description: Create or update delivery override for one restaurant and one predefined location.
      properties:
        restaurant_id:
          type: integer
          example: 1
        location_id:
          type: integer
          example: 1
        price:
          type: integer
          format: int64
          example: 1500
      required: [restaurant_id, location_id, price]

